<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ynov'iT · Formulaire Avant-Vente Odoo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --N:#1A2B4A; --N2:#253B5E; --M:#3EC9A7; --M2:#d1f7ee; --M3:#f0fdf9;
  --A:#F5A623; --R:#E85D5D; --G:#F0F2F5; --G2:#E2E6EA; --G3:#c4cdd9;
  --W:#fff; --T:#1A2B4A; --T2:#4a5c7a; --T3:#8496b0;
  --RAD:10px; --RAD2:6px;
  --SH:0 1px 3px rgba(26,43,74,.07),0 4px 16px rgba(26,43,74,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--G);color:var(--T);font-size:14px;line-height:1.6;min-height:100vh}

/* ── Top bar ── */
.topbar{position:sticky;top:0;z-index:200;background:var(--N);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.topbar-logo{font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--M);text-transform:uppercase}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn-save{padding:9px 22px;background:var(--M);color:var(--N);font-weight:700;
  font-size:13px;border:none;border-radius:var(--RAD2);cursor:pointer;
  font-family:'Outfit',sans-serif;transition:.15s;letter-spacing:.02em}
.btn-save:hover{background:#36b594}
.btn-save:active{transform:scale(.97)}
.progress-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.45)}

/* ── Load screen ── */
#load-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:20px;padding:40px}
.load-card{background:var(--W);border-radius:var(--RAD);box-shadow:var(--SH);padding:40px 48px;
  max-width:480px;width:100%;text-align:center}
.load-title{font-size:20px;font-weight:700;color:var(--N);margin-bottom:8px}
.load-sub{font-size:13px;color:var(--T3);margin-bottom:28px}
.load-file-label{display:inline-block;padding:10px 24px;background:var(--N);color:#fff;
  border-radius:var(--RAD2);cursor:pointer;font-size:13px;font-weight:600;
  font-family:'Outfit',sans-serif;transition:.15s}
.load-file-label:hover{background:var(--N2)}
.load-file-input{display:none}
.load-or{font-size:12px;color:var(--T3);margin:12px 0}
.load-auto{font-size:12px;color:var(--T3);font-style:italic}
.load-spinner{width:32px;height:32px;border:3px solid var(--G2);
  border-top-color:var(--M);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Main layout ── */
#app{display:none}
.form-wrap{max-width:820px;margin:0 auto;padding:28px 24px 80px}

/* ── Section ── */
.form-section{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;
  padding-bottom:10px;border-bottom:2px solid var(--G2)}
.sec-ico{width:36px;height:36px;background:var(--N);border-radius:var(--RAD2);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sec-ttl{font-size:15px;font-weight:700;color:var(--N)}
.sec-stl{font-size:11.5px;color:var(--T3);margin-top:1px}

/* ── Pappers fields ── */
.pf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.pf-full{grid-column:1/-1}
.pf-group{display:flex;flex-direction:column;gap:4px}
.pf-label{font-size:11.5px;font-weight:600;color:var(--T2);letter-spacing:.02em}
.pf-label.req::after{content:' *';color:var(--R)}
.pf-input{padding:9px 12px;border-radius:var(--RAD2);border:1.5px solid var(--G2);
  background:var(--W);font-size:13px;font-family:'Outfit',sans-serif;color:var(--T);
  transition:.15s;width:100%}
.pf-input:focus{outline:none;border-color:var(--M);box-shadow:0 0 0 3px rgba(62,201,167,.12)}

/* ── Question items ── */
.qi{margin-bottom:8px;transition:opacity .15s}
.qi[data-d="1"]{margin-left:20px}
.qi[data-d="2"]{margin-left:38px}
.qi[data-d="3"]{margin-left:54px}
.qi[data-d="4"]{margin-left:68px}
.qi[data-d="1"]>.qcard{border-left:3px solid var(--M2)}
.qi[data-d="2"]>.qcard{border-left:3px solid #e2edd9}
.qi[data-d="3"]>.qcard,
.qi[data-d="4"]>.qcard{border-left:3px solid var(--G2)}
.qcard{background:var(--W);border-radius:var(--RAD);box-shadow:var(--SH);
  border:1px solid transparent;overflow:hidden;transition:.2s}
.qcard.ok{border-color:var(--M2)}
.qmod>.qcard{border-left:4px solid var(--N2);background:linear-gradient(135deg,#fff,#f7f9fc)}
.qmod.yan>.qcard{border-left-color:var(--M)}
.qmod.non>.qcard{border-left-color:var(--G3);opacity:.6}

/* question header */
.qlr{display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;padding:13px 16px 10px}
.qlbl{font-size:13.5px;font-weight:500;color:var(--T);line-height:1.5}
.qmod .qlbl{font-size:14.5px;font-weight:600}
.qnote{font-size:11.5px;color:var(--T3);margin-top:3px;font-style:italic}

/* boolean buttons */
.bbrow{display:flex;gap:8px;padding:0 16px 13px}
.bbn{padding:7px 22px;border-radius:var(--RAD2);border:1.5px solid var(--G2);
  background:var(--G);color:var(--T2);font-size:13px;font-weight:500;cursor:pointer;
  transition:.15s;font-family:'Outfit',sans-serif}
.bbn:hover{border-color:var(--M);color:var(--N)}
.bbn.y{background:var(--M);border-color:var(--M);color:#fff;font-weight:700}
.bbn.n{background:var(--G2);border-color:var(--G3);color:var(--T3);font-weight:500}

/* select options */
.sopts{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 13px}
.sopt{padding:6px 14px;border-radius:var(--RAD2);border:1.5px solid var(--G2);
  background:var(--G);color:var(--T2);font-size:12.5px;cursor:pointer;
  transition:.15s;font-family:'Outfit',sans-serif;text-align:left}
.sopt:hover{border-color:var(--M);color:var(--N);background:var(--M3)}
.sopt.on{background:var(--N);border-color:var(--N);color:#fff;font-weight:600}

/* multi select */
.mlist{display:flex;flex-direction:column;gap:5px;padding:0 16px 13px}
.mitem{display:flex;align-items:center;gap:9px;padding:7px 11px;
  border-radius:var(--RAD2);border:1.5px solid var(--G2);background:var(--G);
  cursor:pointer;transition:.15s;user-select:none}
.mitem:hover{border-color:var(--M);background:var(--M3)}
.mitem.on{border-color:var(--M);background:var(--M3)}
.mchk{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--G3);
  background:var(--W);flex-shrink:0;position:relative;transition:.15s}
.mitem.on .mchk{background:var(--M);border-color:var(--M)}
.mitem.on .mchk::after{content:'✓';position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}

/* number input */
.numrow{display:flex;align-items:center;gap:7px;padding:0 16px 13px}
.nadj{width:30px;height:30px;border-radius:var(--RAD2);border:1.5px solid var(--G2);
  background:var(--G);color:var(--T2);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;transition:.15s}
.nadj:hover{border-color:var(--M);color:var(--M)}
.nin{width:72px;height:30px;border-radius:var(--RAD2);border:1.5px solid var(--G2);
  background:var(--W);text-align:center;font-size:15px;
  font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--N);padding:0;transition:.15s}
.nin:focus{outline:none;border-color:var(--M)}

/* text / date input */
.txin,.dtin{padding:8px 12px;border-radius:var(--RAD2);border:1.5px solid var(--G2);
  background:var(--W);font-size:13px;font-family:'Outfit',sans-serif;color:var(--T);
  transition:.15s;margin:0 16px 13px;display:block;width:calc(100% - 32px)}
.txin:focus,.dtin:focus{outline:none;border-color:var(--M)}

/* children container */
.qch{margin-top:2px}

/* toast */
.toast{position:fixed;bottom:28px;right:28px;background:var(--N);color:#fff;
  padding:12px 20px;border-radius:var(--RAD);font-size:13px;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:999;
  transform:translateY(80px);opacity:0;transition:.3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast .t-icon{color:var(--M);margin-right:8px}

/* ── Pipeline status overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,43,74,.55);
  z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.show{display:flex}
.status-card{background:var(--W);border-radius:var(--RAD);box-shadow:0 8px 40px rgba(0,0,0,.2);
  padding:36px 44px;max-width:520px;width:90%;text-align:center}
.status-icon{font-size:36px;margin-bottom:12px}
.status-title{font-size:18px;font-weight:700;color:var(--N);margin-bottom:6px}
.status-msg{font-size:13px;color:var(--T2);margin-bottom:20px}
.status-bar-wrap{background:var(--G);border-radius:20px;height:10px;overflow:hidden;margin-bottom:16px}
.status-bar{height:100%;background:linear-gradient(90deg,var(--M),#36b594);border-radius:20px;
  transition:width .6s ease;width:0%}
.status-pct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--T3);margin-bottom:20px}
.status-files{text-align:left;margin-top:16px}
.status-files-title{font-size:13px;font-weight:700;color:var(--N);margin-bottom:8px}
.status-file-link{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:var(--RAD2);background:var(--G);margin-bottom:6px;
  text-decoration:none;color:var(--N);font-size:13px;font-weight:500;transition:.15s}
.status-file-link:hover{background:var(--M2);color:var(--N)}
.status-file-ico{font-size:16px}
.btn-close-status{padding:10px 28px;background:var(--N);color:#fff;font-weight:700;
  font-size:13px;border:none;border-radius:var(--RAD2);cursor:pointer;
  font-family:'Outfit',sans-serif;transition:.15s;margin-top:12px}
.btn-close-status:hover{background:var(--N2)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>

<!-- ═══ LOAD SCREEN ═══ -->
<div id="load-screen">
  <div class="load-card">
    <div class="load-spinner" id="spinner"></div>
    <div class="load-title">Formulaire Avant-Vente Odoo</div>
    <div class="load-sub" id="load-msg">Chargement du questionnaire en cours…</div>
    <div id="load-manual" style="display:none">
      <label class="load-file-label" for="file-input">
        Choisir le fichier JSON
      </label>
      <input class="load-file-input" type="file" id="file-input" accept=".json" onchange="handleFile(this)">
      <div class="load-or">ou glissez-déposez le fichier JSON ici</div>
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-logo">Ynov'iT Services</div>
      <div class="topbar-sub">Avant-Vente Odoo V19 — Formulaire de collecte</div>
    </div>
    <div class="topbar-actions">
      <span class="progress-txt" id="progress-txt"></span>
      <button class="btn-save" id="btn-submit" onclick="submitForm()">&#9654; Lancer la génération</button>
    </div>
  </div>
  <div class="form-wrap">
    <div id="form-root"></div>
  </div>
</div>

<!-- ═══ PIPELINE STATUS OVERLAY ═══ -->
<div class="overlay" id="status-overlay">
  <div class="status-card">
    <div class="status-icon" id="status-icon">⏳</div>
    <div class="status-title" id="status-title">Génération en cours…</div>
    <div class="status-msg" id="status-msg">Préparation du pipeline</div>
    <div class="status-bar-wrap"><div class="status-bar" id="status-bar"></div></div>
    <div class="status-pct" id="status-pct">0 %</div>
    <div class="status-files" id="status-files" style="display:none">
      <div class="status-files-title">Livrables générés :</div>
      <div id="status-files-list"></div>
    </div>
    <button class="btn-close-status" id="btn-close-status" style="display:none"
      onclick="closeStatus()">Fermer</button>
  </div>
</div>

<div class="toast" id="toast"><span class="t-icon">✓</span><span id="toast-msg"></span></div>

<script>
'use strict';

// ── Global state ──────────────────────────────────────────
const A = {};           // { questionId: value }
let FORM_DATA = null;
let totalAnswered = 0;
let totalVisible = 0;

// ── Entry point ───────────────────────────────────────────
(async function init() {
  try {
    const r = await fetch('./decision_tree.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    buildForm(data);
  } catch (e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('load-msg').textContent =
      'Impossible de charger le fichier automatiquement. Veuillez le sélectionner manuellement.';
    document.getElementById('load-manual').style.display = 'block';
  }
})();

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      buildForm(data);
    } catch (err) {
      alert('Fichier JSON invalide : ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ── Build entire form ─────────────────────────────────────
function buildForm(data) {
  FORM_DATA = data;
  const root = document.getElementById('form-root');
  let html = '';

  // Section : Identification
  html += buildPappersSection(data.pappers_fields);

  // Section : Questions
  html += buildQuestionsSection(data.questions);

  root.innerHTML = html;

  // Set defaults & wire events
  data.questions.forEach(q => applyDefaults(q));
  wireEvents();

  document.getElementById('load-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  updateProgress();
}

// ── Pappers fields ────────────────────────────────────────
function buildPappersSection(fields) {
  const inputs = fields.map(f => {
    const isFullWidth = f.id === 'adresse';
    const inputEl = f.type === 'number'
      ? `<input type="number" class="pf-input" id="pf-${esc(f.id)}" placeholder="…">`
      : f.type === 'date'
      ? `<input type="date" class="pf-input" id="pf-${esc(f.id)}">`
      : `<input type="text" class="pf-input" id="pf-${esc(f.id)}" placeholder="…">`;
    return `<div class="pf-group${isFullWidth ? ' pf-full' : ''}">
      <div class="pf-label${f.required ? ' req' : ''}">${esc(f.label)}</div>
      ${inputEl}
    </div>`;
  }).join('');

  return `<div class="form-section">
    <div class="sec-hdr">
      <div class="sec-ico">🏢</div>
      <div>
        <div class="sec-ttl">Identification de la société</div>
        <div class="sec-stl">Informations légales et de contact</div>
      </div>
    </div>
    <div class="pf-grid">${inputs}</div>
  </div>`;
}

// ── Questions section ─────────────────────────────────────
function buildQuestionsSection(questions) {
  const general = [];
  const modules = [];

  questions.forEach(q => {
    if (q.uo_base_module !== undefined || (q.id && q.id.startsWith('has_'))) {
      modules.push(q);
    } else {
      general.push(q);
    }
  });

  let html = '';

  if (general.length) {
    html += `<div class="form-section">
      <div class="sec-hdr">
        <div class="sec-ico">⚙️</div>
        <div>
          <div class="sec-ttl">Paramètres généraux du projet</div>
          <div class="sec-stl">Structure, utilisateurs, contraintes et migration</div>
        </div>
      </div>
      <div>${general.map(q => renderQ(q, 0, null, null, null)).join('')}</div>
    </div>`;
  }

  if (modules.length) {
    html += `<div class="form-section">
      <div class="sec-hdr">
        <div class="sec-ico">🧩</div>
        <div>
          <div class="sec-ttl">Modules Odoo</div>
          <div class="sec-stl">Périmètre fonctionnel et besoins métier</div>
        </div>
      </div>
      <div>${modules.map(q => renderQ(q, 0, null, null, null)).join('')}</div>
    </div>`;
  }

  return html;
}

// ── Render single question ────────────────────────────────
function renderQ(q, depth, inheritedVP, inheritedVM, inheritedVV) {
  // Determine visibility source
  let vpId    = inheritedVP;
  let vmMode  = inheritedVM;
  let vmVal   = (inheritedVV !== undefined) ? inheritedVV : null;

  if (q.show_if) {
    const si = q.show_if;
    if (si.parent_id) vpId = si.parent_id;
    if (si.gt  !== undefined) { vmMode = 'gt';  vmVal = si.gt; }
    else if (si.gte !== undefined) { vmMode = 'gte'; vmVal = si.gte; }
    else if (si.lt  !== undefined) { vmMode = 'lt';  vmVal = si.lt; }
    else if (si.lte !== undefined) { vmMode = 'lte'; vmVal = si.lte; }
  }

  const hidden    = vpId !== null ? ' style="display:none"' : '';
  const isModule  = q.uo_base_module !== undefined || (q.id && q.id.startsWith('has_'));

  const vpA  = vpId   ? ` data-vp="${esc(vpId)}"`           : '';
  const vmA  = vmMode ? ` data-vm="${esc(vmMode)}"`          : '';
  const vvA  = vmVal !== null ? ` data-vv="${esc(String(vmVal))}"` : '';

  // Input
  const inputHTML = renderInput(q);

  // Children
  let childrenHTML = '';

  if (q.children) {
    q.children.forEach(c => {
      // If child has its own show_if (number threshold), let it handle visibility
      if (c.show_if && !c.show_if.parent_id) {
        childrenHTML += renderQ(c, depth + 1, q.id, null, null);
      } else {
        childrenHTML += renderQ(c, depth + 1, q.id, 'true', null);
      }
    });
  }

  if (q.children_map) {
    Object.entries(q.children_map).forEach(([val, children]) => {
      children.forEach(c => {
        childrenHTML += renderQ(c, depth + 1, q.id, 'value', val);
      });
    });
  }

  if (q.children_if_contains) {
    Object.entries(q.children_if_contains).forEach(([opt, children]) => {
      children.forEach(c => {
        childrenHTML += renderQ(c, depth + 1, q.id, 'contains', opt);
      });
    });
  }

  return `<div class="qi${isModule ? ' qmod' : ''}"
    id="qi-${esc(q.id)}"
    data-qid="${esc(q.id)}"
    data-t="${esc(q.type)}"
    data-d="${depth}"${vpA}${vmA}${vvA}${hidden}>
    <div class="qcard" id="qc-${esc(q.id)}">
      <div class="qlr">
        <div>
          <div class="qlbl">${esc(q.label)}</div>
          ${q.note ? `<div class="qnote">${esc(q.note)}</div>` : ''}
        </div>
      </div>
      ${inputHTML}
    </div>
    ${childrenHTML ? `<div class="qch">${childrenHTML}</div>` : ''}
  </div>`;
}

// ── Render input by type ──────────────────────────────────
function renderInput(q) {
  switch (q.type) {
    case 'boolean':
      return `<div class="bbrow">
        <button class="bbn" data-action="bool" data-qid="${esc(q.id)}" data-val="true">Oui</button>
        <button class="bbn" data-action="bool" data-qid="${esc(q.id)}" data-val="false">Non</button>
      </div>`;

    case 'select':
      return `<div class="sopts">${(q.options || []).map(o =>
        `<button class="sopt" data-action="select" data-qid="${esc(q.id)}" data-val="${esc(o)}">${esc(o)}</button>`
      ).join('')}</div>`;

    case 'multi_select':
      return `<div class="mlist" id="ml-${esc(q.id)}">${(q.options || []).map(o =>
        `<div class="mitem" data-action="multi" data-qid="${esc(q.id)}" data-val="${esc(o)}">
          <div class="mchk"></div>
          <span>${esc(o)}</span>
        </div>`
      ).join('')}</div>`;

    case 'number': {
      const def = q.default !== undefined ? q.default : 0;
      return `<div class="numrow">
        <button class="nadj" data-action="adjnum" data-qid="${esc(q.id)}" data-val="-1">−</button>
        <input class="nin" type="number" id="nin-${esc(q.id)}"
          value="${esc(String(def))}"
          data-action="number" data-qid="${esc(q.id)}">
        <button class="nadj" data-action="adjnum" data-qid="${esc(q.id)}" data-val="1">+</button>
      </div>`;
    }

    case 'text':
      return `<input class="txin" type="text" id="txin-${esc(q.id)}"
        data-action="text" data-qid="${esc(q.id)}" placeholder="Saisir…">`;

    case 'date':
      return `<input class="dtin" type="date" id="dtin-${esc(q.id)}"
        data-action="date" data-qid="${esc(q.id)}">`;

    default:
      return '';
  }
}

// ── Apply defaults (number) ───────────────────────────────
function applyDefaults(q) {
  if (q.type === 'number' && q.default !== undefined) {
    A[q.id] = q.default;
    // Don't trigger vis update here; children start hidden
  }
  const all = [
    ...(q.children || []),
    ...Object.values(q.children_map || {}).flat(),
    ...Object.values(q.children_if_contains || {}).flat()
  ];
  all.forEach(c => applyDefaults(c));
}

// ── Event wiring (delegation) ─────────────────────────────
function wireEvents() {
  const root = document.getElementById('form-root');

  root.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const qid    = btn.dataset.qid;
    const val    = btn.dataset.val;

    if (action === 'bool')   setB(qid, val === 'true');
    if (action === 'select') setS(qid, val);
    if (action === 'multi')  toggleM(qid, val);
    if (action === 'adjnum') {
      const input = document.getElementById('nin-' + qid);
      if (input) {
        const cur = Number(input.value) || 0;
        const next = Math.max(0, cur + Number(val));
        input.value = next;
        setN(qid, next);
      }
    }
  });

  root.addEventListener('input', e => {
    const el = e.target;
    const action = el.dataset.action;
    const qid    = el.dataset.qid;
    if (!action || !qid) return;

    if (action === 'number') setN(qid, Number(el.value));
    if (action === 'text')   setT(qid, el.value);
    if (action === 'date')   setT(qid, el.value);
  });
}

// ── Answer setters ────────────────────────────────────────
function setB(qid, val) {
  A[qid] = val;
  const qi = document.getElementById('qi-' + qid);
  if (!qi) return;
  const btns = qi.querySelector('.bbrow') ? qi.querySelector('.bbrow').querySelectorAll('.bbn') : [];
  btns.forEach((b, i) => {
    b.classList.toggle('y', i === 0 &&  val);
    b.classList.toggle('n', i === 1 && !val);
  });
  markOk(qid);
  if (qi.classList.contains('qmod')) {
    qi.classList.toggle('yan', val === true);
    qi.classList.toggle('non', val === false);
  }
  updateVis(qid);
  updateProgress();
}

function setS(qid, val) {
  A[qid] = val;
  const ml = document.getElementById('qi-' + qid);
  if (!ml) return;
  ml.querySelectorAll('.sopt').forEach(b => {
    b.classList.toggle('on', b.dataset.val === val);
  });
  markOk(qid);
  updateVis(qid);
  updateProgress();
}

function toggleM(qid, val) {
  if (!Array.isArray(A[qid])) A[qid] = [];
  const idx = A[qid].indexOf(val);
  if (idx >= 0) {
    A[qid].splice(idx, 1);
  } else {
    A[qid].push(val);
  }
  // Update checkboxes
  const ml = document.getElementById('ml-' + qid);
  if (ml) {
    ml.querySelectorAll('.mitem').forEach(item => {
      item.classList.toggle('on', A[qid].includes(item.dataset.val));
    });
  }
  markOk(qid);
  updateVis(qid);
  updateProgress();
}

function setN(qid, val) {
  A[qid] = Number(val);
  markOk(qid);
  updateVis(qid);
  updateProgress();
}

function setT(qid, val) {
  A[qid] = val;
  if (val) markOk(qid);
  updateProgress();
}

function markOk(qid) {
  const qc = document.getElementById('qc-' + qid);
  if (qc) qc.classList.add('ok');
}

// ── Visibility update ─────────────────────────────────────
function updateVis(parentQid) {
  const ans = A[parentQid];
  document.querySelectorAll(`[data-vp="${CSS.escape(parentQid)}"]`).forEach(el => {
    const mode = el.dataset.vm;
    const vv   = el.dataset.vv;
    let show = false;

    if (!mode || mode === 'true')     show = ans === true;
    else if (mode === 'false')        show = ans === false;
    else if (mode === 'value')        show = String(ans) === String(vv);
    else if (mode === 'contains')     show = Array.isArray(ans) && ans.includes(vv);
    else if (mode === 'gt')           show = Number(ans) > Number(vv);
    else if (mode === 'gte')          show = Number(ans) >= Number(vv);
    else if (mode === 'lt')           show = Number(ans) < Number(vv);
    else if (mode === 'lte')          show = Number(ans) <= Number(vv);

    el.style.display = show ? '' : 'none';
    if (!show) clearDescendants(el);
  });
}

// Clear answers + hide all descendants of a hidden element
function clearDescendants(parentEl) {
  parentEl.querySelectorAll('.qi').forEach(el => {
    const qid = el.dataset.qid;
    if (qid) {
      delete A[qid];
      // Reset visual state
      const qc = document.getElementById('qc-' + qid);
      if (qc) qc.classList.remove('ok');
      el.querySelectorAll('.bbn').forEach(b => b.classList.remove('y','n'));
      el.querySelectorAll('.sopt').forEach(b => b.classList.remove('on'));
      el.querySelectorAll('.mitem').forEach(b => b.classList.remove('on'));
      el.classList.remove('yan','non');
    }
  });
}

// ── Progress counter ──────────────────────────────────────
function updateProgress() {
  let visible = 0, answered = 0;
  document.querySelectorAll('.qi').forEach(el => {
    const qid = el.dataset.qid;
    if (!qid || isHidden(el)) return;
    visible++;
    const v = A[qid];
    if (v !== undefined && v !== null && v !== '' &&
        !(Array.isArray(v) && v.length === 0)) {
      answered++;
    }
  });
  const txt = document.getElementById('progress-txt');
  if (txt) txt.textContent = `${answered} / ${visible} questions répondues`;
}

// ── Build output payload ──────────────────────────────────
function buildOutput() {
  const societe = {};
  if (FORM_DATA && FORM_DATA.pappers_fields) {
    FORM_DATA.pappers_fields.forEach(f => {
      const el = document.getElementById('pf-' + f.id);
      if (el && el.value !== '') {
        societe[f.id] = f.type === 'number' ? Number(el.value) : el.value;
      }
    });
  }

  const reponses = {};
  const reponses_detail = [];

  document.querySelectorAll('.qi').forEach(el => {
    if (isHidden(el)) return;
    const qid = el.dataset.qid;
    if (!qid || A[qid] === undefined) return;

    reponses[qid] = A[qid];

    const lblEl = el.querySelector('.qlbl');
    const label = lblEl ? lblEl.textContent.trim() : qid;
    reponses_detail.push({ id: qid, label, valeur: A[qid] });
  });

  return {
    meta: {
      genere_le: new Date().toISOString(),
      version_questionnaire: FORM_DATA?.meta?.version || '5.0',
      outil: "Formulaire Avant-Vente Ynov'iT Odoo"
    },
    societe,
    reponses,
    reponses_detail
  };
}

// ── Submit form → API ─────────────────────────────────────
async function submitForm() {
  const btn = document.getElementById('btn-submit');
  const output = buildOutput();

  // Validation minimale
  if (!output.societe.siren && !output.societe.raison_sociale) {
    showToast('Veuillez renseigner au moins le SIREN ou la raison sociale.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '⏳ Envoi en cours…';

  try {
    const resp = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(output)
    });

    if (!resp.ok) throw new Error(`Erreur serveur (${resp.status})`);

    const result = await resp.json();

    showToast('Formulaire envoyé — génération lancée');
    showStatus();
    startPolling(result.project_id);

  } catch (err) {
    showToast('Erreur : ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '&#9654; Lancer la génération';
  }
}

// ── Status overlay ────────────────────────────────────────
function showStatus() {
  document.getElementById('status-overlay').classList.add('show');
  document.getElementById('status-icon').textContent = '⏳';
  document.getElementById('status-title').textContent = 'Génération en cours…';
  document.getElementById('status-msg').textContent = 'Préparation du pipeline';
  document.getElementById('status-bar').style.width = '0%';
  document.getElementById('status-pct').textContent = '0 %';
  document.getElementById('status-files').style.display = 'none';
  document.getElementById('btn-close-status').style.display = 'none';
}

function closeStatus() {
  document.getElementById('status-overlay').classList.remove('show');
  const btn = document.getElementById('btn-submit');
  btn.disabled = false;
  btn.innerHTML = '&#9654; Lancer la génération';
}

const FILE_ICONS = {
  '.docx': '📄', '.xlsx': '📊', '.pdf': '📑',
  '.zip': '📦', '.json': '🔧', '.md': '📝', '.mmd': '📐'
};

function fileIcon(name) {
  const ext = name.substring(name.lastIndexOf('.'));
  return FILE_ICONS[ext] || '📎';
}

function startPolling(projectId) {
  const interval = setInterval(async () => {
    try {
      const resp = await fetch(`/api/status/${projectId}`);
      if (!resp.ok) return;
      const status = await resp.json();

      // Update progress bar
      document.getElementById('status-bar').style.width = status.progress + '%';
      document.getElementById('status-pct').textContent = status.progress + ' %';
      document.getElementById('status-msg').textContent = status.message;

      if (status.state === 'done') {
        clearInterval(interval);
        document.getElementById('status-icon').textContent = '✅';
        document.getElementById('status-title').textContent = 'Génération terminée';
        document.getElementById('btn-close-status').style.display = '';

        // Show download links
        if (status.files && status.files.length > 0) {
          const list = document.getElementById('status-files-list');
          list.innerHTML = status.files.map(f =>
            `<a class="status-file-link" href="/api/download/${projectId}/${encodeURIComponent(f)}" download>
              <span class="status-file-ico">${fileIcon(f)}</span>
              <span>${esc(f)}</span>
            </a>`
          ).join('');
          document.getElementById('status-files').style.display = '';
        }
      }

      if (status.state === 'error') {
        clearInterval(interval);
        document.getElementById('status-icon').textContent = '❌';
        document.getElementById('status-title').textContent = 'Erreur lors de la génération';
        document.getElementById('btn-close-status').style.display = '';
      }

    } catch (err) {
      // Silently retry on network error
    }
  }, 5000);
}

// Check if element or any ancestor is hidden (display:none)
function isHidden(el) {
  let cur = el;
  while (cur) {
    if (cur.id === 'form-root') break;
    if (cur.style && cur.style.display === 'none') return true;
    cur = cur.parentElement;
  }
  return false;
}

// ── Toast notification ────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── HTML escape ───────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
